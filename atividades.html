<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .fundo{
            background-color: rgb(50, 59, 92);
            height: 100vh;
            color: rgb(0, 0, 0);
            font-family: Arial, Helvetica, sans-serif;
        }
        .calculadora{
            position: absolute;
            background-color: rgb(138, 138, 138);
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 15px;
            padding: 15px;
        }
        .botão{
            background-color: rgba(54, 53, 53, 0.733);
        }
    </style>
</head>
<body>
    <div class="fundo">
        <h1>Atividade da calculadora</h1>
        <div class="calculadora">
            <h1>calculadora</h1>
            <p id="resultado"></p>
            <table>
                <tr>
                    <td><button class="botão">C</button></td>
                    <td><button class="botão"><</button></td>
                    <td><button class="botão">/</button></td>
                    <td><button class="botão">x</button></td>
                </tr>
                <tr>
                    <td><button class="botão">7</button></td>
                    <td><button class="botão">8</button></td>
                    <td><button class="botão">9</button></td>
                    <td><button class="botão">-</button></td>
                </tr>
                <tr>
                    <td><button class="botão">4</button></td>
                    <td><button class="botão">5</button></td>
                    <td><button class="botão">6</button></td>
                    <td><button class="botão">+</button></td>
                </tr>
                <tr>
                    <td><button class="botão">1</button></td>
                    <td><button class="botão">2</button></td>
                    <td><button class="botão">3</button></td>
                    <td rowspan="2"><button class="botão">=</button></td>
                </tr>
                <tr><td colspan="2"><button class="botão">0</button></td>
                    <td><button class="botão">.</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
